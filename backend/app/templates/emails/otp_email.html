<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset OTP</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f9;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#1a1a2e,#16213e);padding:32px 40px 24px;text-align:center;">
              <h1 style="margin:0;font-size:22px;font-weight:700;color:#ffffff;letter-spacing:0.5px;">
                &#x1F4B0; Expense Tracker
              </h1>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:36px 40px 28px;">
              <h2 style="margin:0 0 8px;font-size:20px;font-weight:600;color:#1a1a2e;">
                Password Reset
              </h2>
              <p style="margin:0 0 4px;font-size:15px;line-height:1.5;color:#555770;">
                You requested a password reset. Use the following OTP to complete the process:
              </p>
              <!-- OTP Box -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:24px 0;">
                <tr>
                  <td align="center" style="background-color:#f0f2f5;border-radius:10px;padding:20px 16px;">
                    <span style="font-size:40px;font-weight:700;letter-spacing:10px;color:#1a1a2e;font-family:monospace;">
                      {{ otp }}
                    </span>
                  </td>
                </tr>
              </table>
              <!-- Expiry -->
              <p style="margin:0 0 24px;font-size:13px;color:#8888aa;text-align:center;">
                &#x23F3; Expires in <strong style="color:#e63946;">5 minutes</strong>
              </p>
              <hr style="border:none;border-top:1px solid #e8e8ef;margin:0 0 20px;">
              <p style="margin:0;font-size:13px;line-height:1.5;color:#8888aa;">
                If you didn't request a password reset, you can safely ignore this email. Your account remains secure.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#f8f9fb;padding:18px 40px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#a0a0b8;">
                &copy; 2026 Expense Tracker &bull; All rights reserved
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
